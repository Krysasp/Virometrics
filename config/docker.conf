# Docker Configuration for Virometrics

[redis]
host = redis
port = 6379
db = 0
password = 
max_connections = 50
socket_timeout = 5
socket_connect_timeout = 5
retry_on_timeout = yes

[worker]
name = worker1
queues = default,high,low
max_jobs = 100
job_timeout = 3600
result_ttl = 86400
worker_ttl = 420
monitoring_interval = 10

[queue]
high_priority = high
default_priority = default
low_priority = low
default_timeout = 3600
retry_attempts = 3
retry_delay = 60

[checkpoint]
enabled = true
interval = 300
max_checkpoints = 10
storage_path = /app/data/checkpoints

[monitoring]
cpu_threshold = 90
memory_threshold = 85
disk_threshold = 90
interval = 30
log_level = INFO

[resource_limits]
max_cpu_percent = 80
max_memory_mb = 4096
max_disk_io_mb = 500
max_concurrent_jobs = 5

[gpu]
enabled = false
device_id = 0
memory_fraction = 0.8
