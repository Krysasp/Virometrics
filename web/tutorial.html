<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virometrics Tutorial</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tutorial-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tutorial-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .tutorial-header h1 {
            margin: 0;
            font-size: 2em;
        }
        
        .tutorial-header p {
            margin: 10px 0 0;
            opacity: 0.9;
        }
        
        .step-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .step-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
        }
        
        .step-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
        }
        
        .step-title {
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .step-content {
            padding: 20px;
        }
        
        .step-content p {
            margin: 0 0 15px;
            line-height: 1.6;
        }
        
        .step-content code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        
        .step-content pre {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 15px 0;
        }
        
        .step-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        
        .step-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-nav {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .btn-nav.prev {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-nav.prev:hover {
            background: #cbd5e0;
        }
        
        .btn-nav.next {
            background: #667eea;
            color: white;
        }
        
        .btn-nav.next:hover {
            background: #5a67d8;
        }
        
        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .step-dot.active {
            background: #667eea;
            transform: scale(1.2);
        }
        
        .step-dot.completed {
            background: #48bb78;
        }
        
        .interactive-demo {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .interactive-demo label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .interactive-demo input,
        .interactive-demo select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.9em;
        }
        
        .interactive-demo button {
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .interactive-demo button:hover {
            background: #5a67d8;
        }
        
        .demo-output {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
            min-height: 30px;
        }
        
        .tip-box {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 12px 15px;
            margin: 15px 0;
            border-radius: 0 6px 6px 0;
        }
        
        .tip-box strong {
            color: #2b6cb0;
        }
        
        .completion-message {
            text-align: center;
            padding: 40px;
        }
        
        .completion-message h2 {
            color: #48bb78;
            margin-bottom: 15px;
        }
        
        .completion-message p {
            color: #4a5568;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <div class="tutorial-container">
        <!-- Header -->
        <div class="tutorial-header">
            <h1>Virometrics Tutorial</h1>
            <p>Learn how to use the Virometrics platform for bioinformatics analysis</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <!-- Step Indicator -->
        <div class="step-indicator" id="stepIndicator">
            <!-- Dots will be inserted by JavaScript -->
        </div>
        
        <!-- Tutorial Steps Container -->
        <div id="tutorialContent">
            <!-- Steps will be loaded dynamically -->
        </div>
        
        <!-- Navigation -->
        <div class="step-footer" id="stepFooter">
            <button class="btn-nav prev" id="prevBtn" onclick="prevStep()">
                ← Previous
            </button>
            <span id="stepProgress">Step 1 of 5</span>
            <button class="btn-nav next" id="nextBtn" onclick="nextStep()">
                Next →
            </button>
        </div>
    </div>
    
    <script src="../js/tutorial.js"></script>
</body>
</html>
